  <script>
    lucide.createIcons();

    // -------------------------------------------------------------
    // MOTOR DE INTELIGENCIA ARTIFICIAL (TOLERANTE A FALLOS Y USO LOCAL)
    // -------------------------------------------------------------
    const GeminiAPI = (() => {
      const systemApiKey = ""; 
      const getLocalKey = () => localStorage.getItem('marketup_ai_key') || "";
      const setLocalKey = (key) => localStorage.setItem('marketup_ai_key', key);

      const callLLM = async (promptText, fallbackText = "Respuesta de IA no disponible temporalmente.") => {
        const localKey = getLocalKey();
        let finalKey = systemApiKey;
        let isCustomKey = false;
        
        if (localKey && localKey.trim().startsWith("AIza")) {
            finalKey = localKey.trim();
            isCustomKey = true;
        }

        if (!finalKey) return fallbackText;

        const modelName = isCustomKey ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${finalKey}`;
        const payload = { contents: [{ parts: [{ text: promptText }] }] };
        const delays = [1000, 2000, 4000];

        for (let i = 0; i < 3; i++) {
          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            
            if (response.status === 403 || response.status === 404) return fallbackText; 
            
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const result = await response.json();
            return result.candidates?.[0]?.content?.parts?.[0]?.text || fallbackText;
          } catch (error) {
            if (i === 2) return fallbackText;
            await new Promise(r => setTimeout(r, delays[i]));
          }
        }
      };

      return { callLLM, setLocalKey, getLocalKey };
    })();

      document.getElementById('tab-dashboard').classList.toggle('active', tabId === 'dashboard');
      document.getElementById('tab-generator').classList.toggle('active', tabId === 'generator');
      document.getElementById('tab-reports').classList.toggle('active', tabId === 'reports');
    }

    // -------------------------------------------------------------

    const showToast = (message, type = 'info') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      let iconHtml = '<i data-lucide="info"></i>';
      if (type === 'success') iconHtml = '<i data-lucide="check-circle"></i>';
      if (type === 'error') iconHtml = '<i data-lucide="alert-circle"></i>';
      if (type === 'warning') iconHtml = '<i data-lucide="alert-triangle"></i>';
      toast.innerHTML = `${iconHtml}<div class="toast-content">${message}</div>`;
      container.appendChild(toast);
      lucide.createIcons({ root: toast });
      setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s forwards ease-in';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };

      const escapeHtml = (value) => String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      const formatGuideNumber = (value) => { const digits = String(value ?? '').replace(/\D/g, ''); const num = digits ? parseInt(digits, 10) : 1; return `PED-${String(Math.max(1, num)).padStart(3, '0')}`; };
      const formatDateDisplay = (val) => { if (!val || typeof val !== 'string' || !val.includes('-')) return val; const parts = val.split('-'); if (parts[0].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`; return val; };
      const formatCurrency = (val) => { if (!val) return ''; const cleanStr = String(val).replace(/RD\$?/ig, '').trim(); const num = parseFloat(cleanStr.replace(/,/g, '')); if (isNaN(num)) return val; return `RD$ ${num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`; };
      const extractGuideSequence = (value) => { const match = String(value ?? '').match(/(\d+)/); return match ? Math.max(1, parseInt(match[1], 10)) : 1; };
      const normalizeKey = (key) => key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(/\s+/g, '_');
      const formatPhone = (val) => { const digits = val.replace(/\D/g, ''); if (digits.length === 0) return ''; if (digits.length <= 3) return digits; if (digits.length <= 6) return `${digits.slice(0, 3)}-${digits.slice(3)}`; return `${digits.slice(0, 3)}-${digits.slice(3, 6)}-${digits.slice(6, 10)}`; };
      
      const validatePhone = () => {

        if (digits.length > 0 && digits.length < 10) { input.classList.add('input-error'); err.style.display = 'block'; } 
        else { input.classList.remove('input-error'); err.style.display = 'none'; }
